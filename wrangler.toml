name = "listas"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Serve os arquivos de public/ (html, css, imagens) como assets estáticos.
# Requisições que baterem em um arquivo aqui são respondidas direto,
# sem nem passar pelo código do Worker.
[assets]
directory = "public"
binding = "ASSETS"

# Binding do KV que guarda os usuários (configurado no dashboard da Cloudflare
# em Workers & Pages -> listas -> Settings -> Bindings).
[[kv_namespaces]]
binding = "USERS_KV"
id = "a3ce11ad984a45a1b7aa5d4d5a45fd5d"

# As variáveis abaixo são SECRETS (não coloque valores aqui no arquivo).
# Depois do primeiro deploy, defina cada uma com:
#   wrangler secret put ONEDRIVE_CLIENT_ID
#   wrangler secret put ONEDRIVE_CLIENT_SECRET
#   wrangler secret put ONEDRIVE_REFRESH_TOKEN_INICIAL
#   wrangler secret put SESSION_SECRET
