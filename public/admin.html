<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin - Usuários</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/theme.css">
</head>
<body class="theme">
<header class="topbar">
  <div class="brandmark">
    <img src="/assets/ccb-logo.png" alt="CCB" style="height:28px;">
    <h1>Painel administrativo — Usuários cadastrados</h1>
  </div>
</header>
<div class="wrap">
  <div style="margin-top:16px; margin-bottom:2px;">
    <a href="/admin-listas.html" class="cta">📋 Acessar listas</a>
  </div>

  <div class="panel" id="loginBox" style="margin-top:16px;">
    <label>E-mail</label>
    <input type="email" id="adminEmail" style="max-width:320px;">
    <label>Senha</label>
    <input type="password" id="adminSenha" style="max-width:320px;">
    <div style="margin-top:16px;">
      <button class="primary" id="btnEntrar" style="width:auto; margin-top:0;">Entrar</button>
    </div>
    <div id="loginMsg" class="msg"></div>
  </div>

  <div class="panel" id="tableBox" style="display:none;">
    <div class="panel-head">
      <strong>Usuários</strong>
      <button id="btnAtualizar">Atualizar lista</button>
    </div>
    <table>
      <thead>
        <tr><th>E-mail</th><th>Cadastro em</th><th>Acesso</th><th>Papel</th><th>Listas liberadas</th><th></th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="tableMsg" class="msg"></div>
  </div>

</div>

<script>
let adminToken = '';
const LISTAS = { campomourao: 'Campo Mourão', cianorte: 'Cianorte', ubirata: 'Ubiratã' };

document.getElementById('btnEntrar').addEventListener('click', fazerLogin);

async function fazerLogin() {
  const loginMsg = document.getElementById('loginMsg');
  loginMsg.textContent = '';
  const email = document.getElementById('adminEmail').value.trim();
  const senha = document.getElementById('adminSenha').value;

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: senha })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao entrar');

    if (data.role !== 'admin') {
      throw new Error('Essa conta não tem permissão de administrador.');
    }

    adminToken = data.token;
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('tableBox').style.display = 'block';
    await carregarUsuarios();
  } catch (err) {
    loginMsg.textContent = err.message;
    loginMsg.className = 'msg error';
  }
}

document.getElementById('btnAtualizar').addEventListener('click', carregarUsuarios);

async function carregarUsuarios() {
  const tableMsg = document.getElementById('tableMsg');
  try {
    const res = await fetch('/api/admin-list', {
      headers: { 'Authorization': 'Bearer ' + adminToken }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao carregar');
    renderTable(data.users);
  } catch (err) {
    tableMsg.textContent = err.message;
    tableMsg.className = 'msg error';
  }
}

function renderTable(users) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  users.forEach(u => {
    const tr = document.createElement('tr');
    const dataFmt = u.createdAt ? new Date(u.createdAt).toLocaleString('pt-BR') : '-';

    // Botão liberar/bloquear acesso
    const btnToggle = document.createElement('button');
    btnToggle.className = 'toggleBtn ' + (u.active ? 'on' : 'off');
    btnToggle.textContent = u.active ? '✅ Liberado' : '🚫 Bloqueado';
    btnToggle.onclick = () => alternarAcesso(u.email, !u.active, btnToggle);

    // Select de papel
    const selectRole = document.createElement('select');
    [['padrao', 'Usuário Padrão'], ['admin', 'ADMIN']].forEach(([value, label]) => {
      const opt = document.createElement('option');
      opt.value = value; opt.textContent = label;
      if (u.role === value) opt.selected = true;
      selectRole.appendChild(opt);
    });

    // Checkboxes de listas
    const listBox = document.createElement('div');
    listBox.className = 'listcheckboxes';
    const checkboxes = {};
    Object.entries(LISTAS).forEach(([key, label]) => {
      const lbl = document.createElement('label');
      const chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.value = key;
      chk.checked = u.assignedLists.includes(key);
      checkboxes[key] = chk;
      lbl.appendChild(chk);
      lbl.appendChild(document.createTextNode(label));
      listBox.appendChild(lbl);
    });

    const btnSalvar = document.createElement('button');
    btnSalvar.textContent = 'Salvar';
    btnSalvar.className = 'primary';
    btnSalvar.style.width = 'auto';
    btnSalvar.style.marginTop = '0';
    btnSalvar.onclick = () => {
      const selectedLists = Object.entries(checkboxes)
        .filter(([, chk]) => chk.checked)
        .map(([key]) => key);
      salvar(u.email, selectedLists, selectRole.value, btnSalvar);
    };

    tr.innerHTML = `
      <td>${u.email}</td>
      <td>${dataFmt}</td>
      <td></td>
      <td></td>
      <td></td>
      <td></td>
    `;
    tr.children[2].appendChild(btnToggle);
    tr.children[3].appendChild(selectRole);
    tr.children[4].appendChild(listBox);
    tr.children[5].appendChild(btnSalvar);
    tbody.appendChild(tr);
  });
}

async function alternarAcesso(email, active, btn) {
  const tableMsg = document.getElementById('tableMsg');
  btn.disabled = true;
  try {
    const res = await fetch('/api/admin-set-active', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken },
      body: JSON.stringify({ email, active })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao atualizar acesso');

    tableMsg.textContent = `${email} ${active ? 'liberado' : 'bloqueado'} com sucesso.`;
    tableMsg.className = 'msg ok';
    await carregarUsuarios();
  } catch (err) {
    tableMsg.textContent = err.message;
    tableMsg.className = 'msg error';
    btn.disabled = false;
  }
}

async function salvar(email, lists, role, btn) {
  const tableMsg = document.getElementById('tableMsg');
  btn.disabled = true;
  try {
    const [resLista, resRole] = await Promise.all([
      fetch('/api/admin-assign', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken },
        body: JSON.stringify({ email, lists })
      }),
      fetch('/api/admin-set-role', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken },
        body: JSON.stringify({ email, role })
      })
    ]);
    const dataLista = await resLista.json();
    const dataRole = await resRole.json();
    if (!resLista.ok) throw new Error(dataLista.error || 'Erro ao salvar listas');
    if (!resRole.ok) throw new Error(dataRole.error || 'Erro ao salvar papel');

    tableMsg.textContent = `${email} atualizado com sucesso.`;
    tableMsg.className = 'msg ok';
    await carregarUsuarios();
  } catch (err) {
    tableMsg.textContent = err.message;
    tableMsg.className = 'msg error';
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
