<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cadastro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/theme.css">
</head>
<body class="theme">
  <div class="auth-shell">
    <div class="card">
      <div id="stepSignup">
        <div class="brandmark">
          <img src="/assets/ccb-logo.jpg" alt="CCB">
          <span class="brandtext">Sistema de Listas</span>
        </div>
        <h1 class="title">Criar conta</h1>
        <p class="sub">Depois de se cadastrar, aguarde um administrador liberar seu acesso.</p>
        <form id="formSignup">
          <label>E-mail</label>
          <input type="email" id="email" required>
          <label>Senha</label>
          <input type="password" id="password" minlength="6" required>
          <label>Confirmar senha</label>
          <input type="password" id="confirmPassword" minlength="6" required>
          <button type="submit" id="btnSignup">Criar conta</button>
        </form>
        <div class="link">Já tem conta? <a href="login.html">Entrar</a></div>
      </div>

      <div id="feedback"></div>
    </div>
  </div>

<script>
const feedback = document.getElementById('feedback');
function showMsg(text, type){
  feedback.innerHTML = `<div class="msg ${type}">${text}</div>`;
}

document.getElementById('formSignup').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const btn = document.getElementById('btnSignup');

  if (password !== confirmPassword) {
    showMsg('As senhas não conferem.', 'error');
    return;
  }

  btn.disabled = true; btn.textContent = 'Enviando...';
  try {
    const res = await fetch('/api/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, confirmPassword })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao cadastrar');

    document.getElementById('formSignup').classList.add('hidden');
    showMsg('Cadastro realizado! Aguarde um administrador liberar seu acesso e depois faça login. <a href="login.html">Ir para login</a>', 'ok');
  } catch (err) {
    showMsg(err.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Criar conta';
  }
});
</script>
</body>
</html>
