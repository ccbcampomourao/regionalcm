<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Configuração OneDrive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/theme.css">
</head>
<body class="theme">
<div class="wrap narrow" style="margin-top:56px;">
  <div class="panel">
    <div class="brandmark" style="margin-bottom:14px;">
      <img src="/assets/ccb-logo.jpg" alt="CCB" style="height:30px;">
      <span class="brandtext" style="font-size:15px;">Sistema de Listas</span>
    </div>
    <h1 class="title">Autorização do OneDrive</h1>
    <div id="resultado"></div>
  </div>
</div>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  var erro = params.get('error_description') || params.get('error');
  var div = document.getElementById('resultado');

  if (erro) {
    div.innerHTML = '<p class="msg error">Erro retornado pela Microsoft: ' + erro + '</p>';
  } else if (code) {
    div.innerHTML =
      '<p class="sub" style="margin-bottom:10px;">Copie este código (é de uso único e expira em poucos minutos) e siga o passo ' +
      '"Trocar o código por tokens" no README:</p>' +
      '<textarea class="code-out" readonly onclick="this.select()">' + code + '</textarea>' +
      '<div class="notice">Não recarregue nem feche esta página antes de copiar — se o ' +
      'código expirar, é só refazer o link de autorização de novo.</div>';
  } else {
    div.innerHTML = '<p class="sub">Nenhum código encontrado na URL. Isso é esperado se você abriu esta ' +
      'página diretamente — ela só mostra algo quando a Microsoft redireciona pra cá depois ' +
      'do login.</p>';
  }
})();
</script>
</body>
</html>
