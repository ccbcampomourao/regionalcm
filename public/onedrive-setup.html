<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Configuração OneDrive</title>
<style>
  body { font-family: Arial, Helvetica, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #222; }
  textarea { width: 100%; height: 90px; font-family: monospace; font-size: 13px; padding: 10px; border: 1px solid #ccd3da; border-radius: 6px; }
  .erro { color: #8a1f1f; }
  .aviso { background: #fff4d6; border: 1px solid #e5c675; padding: 12px; border-radius: 6px; font-size: 13px; margin-top: 16px; }
</style>
</head>
<body>
<h1>Autorização do OneDrive</h1>
<div id="resultado"></div>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  var erro = params.get('error_description') || params.get('error');
  var div = document.getElementById('resultado');

  if (erro) {
    div.innerHTML = '<p class="erro">Erro retornado pela Microsoft: ' + erro + '</p>';
  } else if (code) {
    div.innerHTML =
      '<p>Copie este código (é de uso único e expira em poucos minutos) e siga o passo ' +
      '"Trocar o código por tokens" no README:</p>' +
      '<textarea readonly onclick="this.select()">' + code + '</textarea>' +
      '<div class="aviso">Não recarregue nem feche esta página antes de copiar — se o ' +
      'código expirar, é só refazer o link de autorização de novo.</div>';
  } else {
    div.innerHTML = '<p>Nenhum código encontrado na URL. Isso é esperado se você abriu esta ' +
      'página diretamente — ela só mostra algo quando a Microsoft redireciona pra cá depois ' +
      'do login.</p>';
  }
})();
</script>
</body>
</html>
