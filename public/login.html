<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entrar</title>
<style>
  :root{ --primary:#1f3a5f; --accent:#8a1f1f; --bg:#f4f6f8; --line:#ccd3da; }
  *{box-sizing:border-box; font-family:Arial, Helvetica, sans-serif;}
  body{margin:0; background:var(--bg); color:#222; display:flex; align-items:center; justify-content:center; min-height:100vh;}
  .card{background:#fff; border:1px solid var(--line); border-radius:10px; padding:28px; width:100%; max-width:380px; box-shadow:0 4px 14px rgba(0,0,0,.06);}
  h1{font-size:20px; margin:0 0 6px; color:var(--primary);}
  p.sub{margin:0 0 18px; font-size:13px; color:#666;}
  label{font-size:13px; font-weight:bold; color:#444; display:block; margin:12px 0 4px;}
  input{width:100%; border:1px solid var(--line); border-radius:6px; padding:9px 10px; font-size:14px;}
  button{width:100%; margin-top:18px; padding:10px; border:none; border-radius:6px; background:var(--primary); color:#fff; font-size:14px; cursor:pointer;}
  button:disabled{opacity:.6; cursor:default;}
  .msg{margin-top:12px; font-size:13px; padding:8px 10px; border-radius:6px;}
  .msg.error{background:#fdecea; color:var(--accent);}
  .link{margin-top:16px; font-size:13px; text-align:center;}
  .link a{color:var(--primary);}
</style>
</head>
<body>
  <div class="card">
    <h1>Entrar</h1>
    <p class="sub">Acesse com o e-mail e senha do seu cadastro.</p>
    <form id="formLogin">
      <label>E-mail</label>
      <input type="email" id="email" required>
      <label>Senha</label>
      <input type="password" id="password" required>
      <button type="submit" id="btnLogin">Entrar</button>
    </form>
    <div id="feedback"></div>
    <div class="link">Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a></div>
  </div>

<script>
const feedback = document.getElementById('feedback');
document.getElementById('formLogin').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btnLogin');

  btn.disabled = true; btn.textContent = 'Entrando...';
  feedback.innerHTML = '';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao entrar');

    localStorage.setItem('session_token', data.token);
    window.location.href = data.redirectUrl;
  } catch (err) {
    feedback.innerHTML = `<div class="msg error">${err.message}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar';
  }
});
</script>
</body>
</html>
