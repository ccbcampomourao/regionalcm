<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/theme.css">
</head>
<body class="theme">
  <div class="auth-shell">
    <div class="card">
      <div class="brandmark">
        <svg width="30" height="26" viewBox="0 0 30 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 20 L15 6 L24 20" stroke="#a97d3d" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="6" cy="20" r="3" fill="#1b2a41"/>
          <circle cx="15" cy="6" r="3" fill="#a97d3d"/>
          <circle cx="24" cy="20" r="3" fill="#1b2a41"/>
        </svg>
        <span class="brandtext">Sistema de Listas</span>
      </div>
      <h1 class="title">Entrar</h1>
      <p class="sub">Acesse com o e-mail e senha do seu cadastro.</p>
      <form id="formLogin">
        <label>E-mail</label>
        <input type="email" id="email" required>
        <label>Senha</label>
        <input type="password" id="password" required>
        <button type="submit" id="btnLogin">Entrar</button>
      </form>
      <div id="feedback"></div>
      <div class="link">Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a></div>
    </div>
  </div>

<script>
const feedback = document.getElementById('feedback');
document.getElementById('formLogin').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btnLogin');

  btn.disabled = true; btn.textContent = 'Entrando...';
  feedback.innerHTML = '';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao entrar');

    localStorage.setItem('session_token', data.token);
    window.location.href = data.redirectUrl;
  } catch (err) {
    feedback.innerHTML = `<div class="msg error">${err.message}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar';
  }
});
</script>
</body>
</html>
