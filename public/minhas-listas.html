<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Minhas listas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/theme.css">
<style>body.theme{visibility:hidden;}</style>
</head>
<body class="theme">
<header class="topbar">
  <div class="brandmark">
    <svg width="26" height="22" viewBox="0 0 30 26" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 20 L15 6 L24 20" stroke="#c99a55" stroke-width="1.6" stroke-linecap="round"/>
      <circle cx="6" cy="20" r="3" fill="#fdfbf6"/>
      <circle cx="15" cy="6" r="3" fill="#c99a55"/>
      <circle cx="24" cy="20" r="3" fill="#fdfbf6"/>
    </svg>
    <h1>Minhas listas</h1>
  </div>
  <a href="#" id="btnSair" class="btn-ghost">Sair</a>
</header>
<div class="wrap narrow">
  <p class="lede">Escolha qual lista você quer visualizar:</p>
  <div class="grid" id="grid"></div>
  <p class="empty" id="empty" style="display:none;">Você ainda não tem nenhuma lista liberada. Fale com um administrador.</p>
</div>

<script>
const LISTA_URLS = { campomourao: '/listacampomourao.html', cianorte: '/listacianorte.html', ubirata: '/listaubirata.html' };
const LISTA_LABELS = { campomourao: 'Campo Mourão', cianorte: 'Cianorte', ubirata: 'Ubiratã' };

document.getElementById('btnSair').addEventListener('click', function (e) {
  e.preventDefault();
  localStorage.removeItem('session_token');
  window.location.href = '/login.html';
});

function renderListas(lists) {
  const grid = document.getElementById('grid');
  if (!lists || lists.length === 0) {
    document.getElementById('empty').style.display = 'block';
    return;
  }
  lists.forEach(function (key) {
    if (!LISTA_URLS[key]) return;
    const a = document.createElement('a');
    a.className = 'citycard';
    a.href = LISTA_URLS[key];
    const pin = document.createElement('div');
    pin.className = 'pin';
    pin.innerHTML = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 22s7-7.1 7-12.5A7 7 0 0 0 5 9.5C5 14.9 12 22 12 22Z" stroke="currentColor" stroke-width="1.7"/><circle cx="12" cy="9.5" r="2.4" stroke="currentColor" stroke-width="1.7"/></svg>';
    const div = document.createElement('div');
    div.className = 'nome';
    div.textContent = LISTA_LABELS[key] || key;
    a.appendChild(pin);
    a.appendChild(div);
    grid.appendChild(a);
  });
}

(function () {
  const token = localStorage.getItem('session_token');
  if (!token) { window.location.replace('/login.html'); return; }
  fetch('/api/verify-session', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: token })
  }).then(function (r) { return r.json(); }).then(function (data) {
    if (data && data.ok) {
      document.body.style.visibility = 'visible';
      renderListas(data.lists);
    } else {
      localStorage.removeItem('session_token');
      window.location.replace('/login.html');
    }
  }).catch(function () {
    window.location.replace('/login.html');
  });
})();
</script>
</body>
</html>
